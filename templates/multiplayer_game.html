<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeBreaker | Multiplayer Game</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
      /* --- GLOBAL LAYOUT --- */
      body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }

      .multiplayer-layout {
        display: grid;
        grid-template-columns: 250px 1fr 250px;
        gap: 20px;
        max-width: 1200px;
        margin: 0 auto;
        height: calc(100vh - 80px); /* Constrain height to viewport */
        padding: 20px;
        box-sizing: border-box;
      }

      /* --- PLAYER CARDS (Left & Right) --- */
      .player-card {
        background: #1b1b1d;
        border: 1px solid #3a3a3c;
        border-radius: 12px;
        padding: 20px;
        text-align: center;
        height: fit-content;
      }
      .player-card img {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 2px solid;
        margin-bottom: 10px;
      }
      .self-card {
        border-top: 3px solid #538d4e;
      }
      .self-card img {
        border-color: #538d4e;
      }

      .opp-card {
        border-top: 3px solid #cf6679;
      }
      .opp-card img {
        border-color: #cf6679;
      }

      .player-name {
        font-weight: bold;
        font-size: 1.2rem;
        margin-bottom: 5px;
      }
      .player-stats {
        font-size: 0.85rem;
        color: #b0b3b8;
        margin-bottom: 15px;
      }
      .player-attempts {
        font-family: "Courier New", Courier, monospace;
        background: #272729;
        padding: 5px 10px;
        border-radius: 5px;
        font-weight: bold;
        font-size: 1.1rem;
      }

      /* --- CENTER GAME ZONE --- */
      .game-zone {
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100%;
        overflow: hidden;
      }

      /* Override game board to prevent massive gaps */
      #game-board {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 10px;
        margin-bottom: 10px;
        flex-grow: 1;
        overflow-y: auto;
        width: 100%;
      }
      #keyboard {
        margin-top: 10px;
      }

      /* --- INTEGRATED CHAT (Right Column) --- */
      .chat-integrated {
        margin-top: 20px;
        background: #1b1b1d;
        border: 1px solid #3a3a3c;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        height: 350px; /* Fixed height for desktop */
      }
      .chat-header {
        background: #cf6679;
        color: white;
        padding: 8px 12px;
        font-weight: bold;
        border-top-left-radius: 10px;
        border-top-right-radius: 10px;
        font-size: 0.9rem;
      }
      .chat-messages {
        flex-grow: 1;
        overflow-y: auto;
        padding: 10px;
        font-size: 0.85rem;
      }
      .chat-input-area {
        display: flex;
        padding: 8px;
        border-top: 1px solid #3a3a3c;
      }
      .chat-input-area input {
        flex-grow: 1;
        background: #272729;
        color: white;
        border: 1px solid #3a3a3c;
        padding: 6px;
        border-radius: 5px;
        width: 100%; /* Fix width */
      }
      .chat-input-area button {
        background: #cf6679;
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 5px;
        cursor: pointer;
        margin-left: 5px;
      }

      .quick-chats {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        padding: 8px;
        border-top: 1px solid #3a3a3c;
      }
      .quick-chats button {
        background: #272729;
        color: #b0b3b8;
        border: 1px solid #3a3a3c;
        border-radius: 15px;
        font-size: 0.7rem;
        padding: 4px 8px;
        cursor: pointer;
      }

      /* --- MOBILE OVERRIDES --- */
      .mobile-vs-bar {
        display: none;
      }
      .mobile-chat-fab {
        display: none;
      }
      .chat-modal-mobile {
        display: none;
      } /* Used only on mobile via JS toggle */

      @media (max-width: 800px) {
        .multiplayer-layout {
          display: flex; /* Stack vertically instead of grid */
          flex-direction: column;
          padding: 10px;
          height: calc(100vh - 65px); /* Let it fill the viewport properly */
          box-sizing: border-box;
        }

        /* Hide the heavy desktop side-cards */
        .player-card {
          display: none;
        }
        .chat-integrated {
          display: none;
        }

        /* Show compact VS Bar pinned to top */
        .mobile-vs-bar {
          display: flex;
          width: 100%;
          background: #1b1b1d;
          border-bottom: 2px solid #3a3a3c;
          padding: 5px 10px;
          justify-content: space-between;
          align-items: center;
          box-sizing: border-box;
          flex-shrink: 0;
        }
        .mobile-vs-player {
          display: flex;
          flex-direction: column;
          align-items: center;
          width: 40%;
        }
        .mobile-vs-player img {
          width: 40px;
          height: 40px;
          border-radius: 50%;
          border: 2px solid;
          margin-bottom: 2px;
        }
        .mobile-vs-self img {
          border-color: #538d4e;
        }
        .mobile-vs-opp img {
          border-color: #cf6679;
        }
        .mobile-vs-name {
          font-weight: bold;
          font-size: 0.9rem;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
          max-width: 100%;
        }
        .mobile-vs-stats {
          font-size: 0.7rem;
          color: #b0b3b8;
        }

        /* Floating Action Button for Chat */
        .mobile-chat-fab {
          display: flex;
          position: fixed;
          bottom: 280px; /* Float above the keyboard */
          right: 20px;
          width: 50px;
          height: 50px;
          background: #cf6679;
          border-radius: 50%;
          color: white;
          justify-content: center;
          align-items: center;
          font-size: 1.5rem;
          cursor: pointer;
          z-index: 100;
          box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }
        .chat-badge {
          position: absolute;
          top: 0;
          right: 0;
          width: 12px;
          height: 12px;
          background: #ff3b30;
          border-radius: 50%;
          display: none;
        }

        /* Mobile Chat Modal overriding integrated chat */
        .chat-modal-mobile {
          display: none;
          position: fixed;
          bottom: 80px;
          right: 5%;
          width: 90%;
          height: 350px;
          background: #1b1b1d;
          border: 1px solid #cf6679;
          border-radius: 10px;
          flex-direction: column;
          z-index: 1000;
          box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        /* Empty out redudant multiplayer-layout class redeclaration */

        header h1 {
          font-size: 1.2rem !important;
          margin-top: 5px;
        }

        .game-zone {
          flex-grow: 1;
          display: flex;
          flex-direction: column;
          overflow: hidden; /* Prevent this wrapper from expanding */
        }

        #game-board {
          flex-grow: 1;
          overflow-y: auto;
          width: 100%;
        }

        #keyboard {
          flex-shrink: 0; /* Keyboard must never shrink or hide */
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1
        style="
          flex-grow: 1;
          text-align: center;
          color: #538d4e;
          font-size: 1.8rem;
        "
      >
        [ MODE: {{ mode|default('UNKNOWN')|upper }} ]
      </h1>
      <div class="header-tools">
        <button
          id="giveup-btn"
          class="tool-btn"
          title="Surrender"
          style="
            font-size: 1.5rem;
            background: #272729;
            border-radius: 5px;
            padding: 5px 10px;
            border: 1px solid #3a3a3c;
          "
          onclick="giveUp()"
        >
          🏳️
        </button>
      </div>
    </header>

    <!-- Audio Elements -->
    <audio
      id="audio-click"
      src="{{ url_for('static', filename='audio/click.wav') }}"
      preload="auto"
    ></audio>
    <audio
      id="audio-bull"
      src="{{ url_for('static', filename='audio/bull.wav') }}"
      preload="auto"
    ></audio>
    <audio
      id="audio-miss"
      src="{{ url_for('static', filename='audio/miss.wav') }}"
      preload="auto"
    ></audio>
    <audio
      id="audio-chat"
      src="{{ url_for('static', filename='audio/chat.wav') }}"
      preload="auto"
    ></audio>
    <audio
      id="audio-win"
      src="{{ url_for('static', filename='audio/game-win.mp3') }}"
      preload="auto"
    ></audio>
    <audio
      id="audio-lose"
      src="{{ url_for('static', filename='audio/game-lose.mp3') }}"
      preload="auto"
    ></audio>

    <div class="multiplayer-layout">
      <!-- MOBILE VIEW: Compact VS Bar (Hidden on Desktop) -->
      <div class="mobile-vs-bar">
        <div class="mobile-vs-player mobile-vs-self">
          <img id="mobile-my-avatar" src="" />
          <div
            class="mobile-vs-name"
            style="color: #538d4e"
            id="mobile-my-name-display"
          >
            Me
          </div>
          <div class="mobile-vs-stats">
            W:<span id="mobile-my-wins">0</span> | L:<span id="mobile-my-loss"
              >0</span
            >
          </div>
        </div>

        <div style="font-weight: bold; color: #3a3a3c; font-size: 1.5rem">
          VS
        </div>

        <div class="mobile-vs-player mobile-vs-opp">
          <img
            src="{{ opponent.avatar|default('https://api.dicebear.com/7.x/bottts/svg?seed=none') }}"
          />
          <div class="mobile-vs-name" style="color: #cf6679">
            {{ opponent.username|default('Opponent') }}
          </div>
          <div class="mobile-vs-stats">
            Guesses: <span id="mobile-opp-attempts">0</span>
          </div>
        </div>
      </div>

      <!-- LEFT COLUMN: Self Status -->
      <div class="player-card self-card">
        <img id="desktop-my-avatar" src="" />
        <div class="player-name" id="desktop-my-name" style="color: #538d4e">
          Agent
        </div>
        <div class="player-stats">
          W: <span id="desktop-my-wins">0</span> | L:
          <span id="desktop-my-loss">0</span>
        </div>
        <div style="font-size: 0.8rem; color: #818384; margin-bottom: 5px">
          YOUR STATUS
        </div>
      </div>

      <!-- CENTER COLUMN: Game Board -->
      <div class="game-zone">
        <div id="game-board"></div>
        <div id="keyboard">
          <button class="key">1</button>
          <button class="key">2</button>
          <button class="key">3</button>
          <button class="key">4</button>
          <button class="key">5</button>
          <button class="key">6</button>
          <button class="key">7</button>
          <button class="key">8</button>
          <button class="key">9</button>
          <button class="key">0</button>
          <button id="del-btn" class="key big-key" style="grid-column: span 2">
            DELETE
          </button>
          <button
            id="enter-btn"
            class="key big-key"
            style="grid-column: span 3; background-color: #538d4e"
          >
            ENTER
          </button>
        </div>
      </div>

      <!-- RIGHT COLUMN: Opponent Status & Chat -->
      <div>
        <div class="player-card opp-card">
          <img
            src="{{ opponent.avatar|default('https://api.dicebear.com/7.x/bottts/svg?seed=none') }}"
          />
          <div class="player-name" style="color: #cf6679">
            {{ opponent.username|default('Opponent') }}
          </div>
          <div class="player-stats">Opponent</div>

          <div style="font-size: 0.8rem; color: #818384; margin-bottom: 5px">
            ATTEMPTS MADE
          </div>
          <div class="player-attempts" id="desktop-opp-attempts">0</div>
        </div>

        <!-- Desktop Integrated Chat -->
        <div class="chat-integrated">
          <div class="chat-header">Comms Link</div>
          <div class="chat-messages desktop-chat-box"></div>
          <div class="quick-chats">
            <button onclick="sendQuickChat('GLHF!')">GLHF</button>
            <button onclick="sendQuickChat('Wow!')">Wow!</button>
            <button onclick="sendQuickChat('Nice guess')">Nice guess</button>
            <button onclick="sendQuickChat('GG')">GG</button>
          </div>
          <form
            class="chat-input-area"
            onsubmit="handleChatSubmit(event, 'desktop-input')"
          >
            <input
              type="text"
              id="desktop-input"
              placeholder="Message"
              autocomplete="off"
            />
            <button type="submit">&gt;</button>
          </form>
        </div>
      </div>
    </div>

    <!-- MOBILE OVERLAYS: FAB & Hidden Modal -->
    <div class="mobile-chat-fab" onclick="toggleMobileChat()">
      💬
      <div class="chat-badge" id="mobile-chat-badge"></div>
    </div>

    <div id="mobile-chat-modal" class="chat-modal-mobile">
      <div
        class="chat-header"
        style="display: flex; justify-content: space-between"
      >
        <span>Comms Link</span>
        <span
          style="cursor: pointer; font-size: 1.2rem"
          onclick="toggleMobileChat()"
          >&times;</span
        >
      </div>
      <div class="chat-messages mobile-chat-box"></div>
      <div class="quick-chats">
        <button onclick="sendQuickChat('GLHF!')">GLHF</button>
        <button onclick="sendQuickChat('Wow!')">Wow!</button>
        <button onclick="sendQuickChat('Nice guess')">Nice guess</button>
        <button onclick="sendQuickChat('GG')">GG</button>
      </div>
      <form
        class="chat-input-area"
        onsubmit="handleChatSubmit(event, 'mobile-input')"
      >
        <input
          type="text"
          id="mobile-input"
          placeholder="Message"
          autocomplete="off"
        />
        <button type="submit">&gt;</button>
      </form>
    </div>

    <!-- Game Over Modal (Reusing index.html styling) -->
    <div id="gameOverModal" class="modal hidden">
      <div class="modal-content">
        <h2 id="gameOverTitle" style="margin-top: 0; text-align: center">
          MATCH OVER
        </h2>
        <hr style="border-color: #3a3a3c" />
        <div style="text-align: center; margin: 20px 0">
          <h3 id="winner-name" style="color: #538d4e; margin-bottom: 5px"></h3>
          <p style="color: #818384; font-size: 0.9rem">The code was:</p>
          <div
            id="final-code"
            style="
              font-size: 2.5rem;
              letter-spacing: 10px;
              color: white;
              background-color: #272729;
              display: inline-block;
              padding: 10px;
              border-radius: 10px;
            "
          ></div>
        </div>
        <div style="text-align: center; margin-top: 20px" id="modal-buttons">
          <button
            id="rematch-btn"
            class="btn-start"
            style="
              display: inline-block;
              padding: 10px 20px;
              font-size: 1rem;
              margin-right: 10px;
              cursor: pointer;
            "
            onclick="requestRematch()"
          >
            PLAY AGAIN
          </button>
          <a
            href="/"
            class="btn-start"
            style="
              display: inline-block;
              padding: 10px 20px;
              font-size: 1rem;
              text-decoration: none;
              background-color: #3a3a3c;
            "
            >START OVER</a
          >
        </div>
      </div>
    </div>

    <!-- INLINE SCRIPT FOR MULTIPLAYER DOM LOGIC -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script id="my-history-data" type="application/json">
      {{ my_history | tojson | safe }}
    </script>
    <script>
      const socket = io();
      const roomCode = "{{ room_code }}";
      const mySid = "{{ session.get('sid') }}";
      const gameLength = Number("{{ length|default(4) }}");
      const maxTries = 100; // Basically unlimited for multiplayer

      const historyDataElement = document.getElementById("my-history-data");
      let myHistoryRaw = [];
      try {
        myHistoryRaw = historyDataElement
          ? JSON.parse(historyDataElement.textContent)
          : [];
      } catch (e) {}
      const myHistory = myHistoryRaw || [];

      let currentRow = 0;
      let currentTile = 0;
      let gameOver = false;
      let currentGuess = "";
      let isSubmitting = false;

      document.addEventListener("DOMContentLoaded", () => {
        // Load user data from localStorage for self cards
        const defaultAvatar =
          "https://api.dicebear.com/7.x/bottts/svg?seed=fallback";
        const selfName = "{{ session.get('username') }}";
        const selfAvatar = "{{ session.get('avatar') }}";

        document.getElementById("desktop-my-name").innerText = selfName;
        document.getElementById("desktop-my-avatar").src = selfAvatar;
        document.getElementById("mobile-my-name-display").innerText = selfName;
        document.getElementById("mobile-my-avatar").src = selfAvatar;

        // Load stats
        const statsStr = localStorage.getItem("codebreaker_stats");
        if (statsStr) {
          try {
            const stats = JSON.parse(statsStr);
            document.getElementById("desktop-my-wins").innerText =
              stats.won || 0;
            document.getElementById("desktop-my-loss").innerText =
              (stats.played || 0) - (stats.won || 0);
            document.getElementById("mobile-my-wins").innerText =
              stats.won || 0;
            document.getElementById("mobile-my-loss").innerText =
              (stats.played || 0) - (stats.won || 0);
          } catch (e) {}
        }

        createGrid();

        if (myHistory && myHistory.length > 0) {
          myHistory.forEach((item) => {
            // Fill the tiles
            item.guess.split("").forEach((num, index) => {
              const tile = document.getElementById(
                `row-${currentRow}-tile-${index}`,
              );
              if (tile) {
                tile.innerText = num;
                tile.classList.add("active");
              }
            });

            // Add feedback
            updateFeedback(item.result);
            currentRow++;

            if (currentRow >= document.querySelectorAll(".row").length - 2) {
              for (let k = 0; k < 5; k++)
                addSingleRow(document.querySelectorAll(".row").length);
            }
          });
          const nextRow = document.getElementById(`row-${currentRow}`);
          if (nextRow)
            nextRow.scrollIntoView({ behavior: "smooth", block: "center" });
          // Also update our local opponent attempts view to be safe, though opponent broadcasts their own
        }

        setupKeyboard();

        // Pass our local stats up to the server immediately upon connecting
        const joinStatsStr = localStorage.getItem("codebreaker_stats");
        let myStats = { won: 0, played: 0 };
        if (joinStatsStr) {
          try {
            myStats = JSON.parse(joinStatsStr);
          } catch (e) {}
        }

        socket.emit("join_game", { room: roomCode, stats: myStats });
      });

      function createGrid() {
        const board = document.getElementById("game-board");
        board.innerHTML = "";
        for (let i = 0; i < 12; i++) addSingleRow(i);
      }

      function addSingleRow(rowIndex) {
        const board = document.getElementById("game-board");
        const row = document.createElement("div");
        row.classList.add("row");
        row.id = `row-${rowIndex}`;

        for (let j = 0; j < gameLength; j++) {
          const tile = document.createElement("div");
          tile.classList.add("tile");
          tile.id = `row-${rowIndex}-tile-${j}`;
          row.appendChild(tile);
        }

        const feedbackBox = document.createElement("div");
        feedbackBox.classList.add("feedback-box");
        feedbackBox.id = `feedback-${rowIndex}`;

        for (let k = 0; k < gameLength; k++) {
          const dot = document.createElement("div");
          dot.classList.add("dot");
          feedbackBox.appendChild(dot);
        }

        row.appendChild(feedbackBox);
        board.appendChild(row);
      }

      // --- INPUT LOGIC ---
      function playSound(id) {
        const sound = document.getElementById(id);
        if (sound) {
          sound.currentTime = 0;
          sound
            .play()
            .catch((err) => console.log("Audio play prevented:", err));
        }
      }

      function setupKeyboard() {
        const keyboard = document.getElementById("keyboard");
        if (!keyboard) return;

        let longPressTimer;
        let isLongPress = false;

        // HELPER: The "Cross Out" Action
        const triggerRightClick = (btn) => {
          const val = btn.innerText.trim();
          if (val !== "ENTER" && val !== "DELETE") {
            btn.classList.toggle("crossed-out");
            if (navigator.vibrate) navigator.vibrate(50);
          }
        };

        // 1. TOUCH EVENTS
        keyboard.addEventListener(
          "touchstart",
          (e) => {
            const btn = e.target.closest("button");
            if (!btn) return;
            isLongPress = false;
            longPressTimer = setTimeout(() => {
              isLongPress = true;
              triggerRightClick(btn);
            }, 400); // slightly faster crossout
          },
          { passive: true },
        );

        keyboard.addEventListener("touchend", (e) => {
          clearTimeout(longPressTimer);
          if (isLongPress) e.preventDefault();
        });

        keyboard.addEventListener("touchmove", () => {
          clearTimeout(longPressTimer);
          isLongPress = false;
        });

        // 2. MOUSE CONTEXT / RIGHT CLICK
        keyboard.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          const btn = e.target.closest("button");
          if (btn) triggerRightClick(btn);
        });

        // 3. NORMAL CLICK
        keyboard.addEventListener("click", (e) => {
          const btn = e.target.closest("button");
          if (!btn) return;

          e.preventDefault();
          btn.blur();

          if (isLongPress) return;

          playSound("audio-click");
          const val = btn.innerText.trim();
          if (val === "ENTER") submitGuess();
          else if (val === "DELETE") deleteNumber();
          else handleInput(val);
        });
      }

      function handleInput(number) {
        if (gameOver || isSubmitting) return;
        if (currentTile < gameLength) {
          const tile = document.getElementById(
            `row-${currentRow}-tile-${currentTile}`,
          );
          if (tile) {
            tile.innerText = number;
            tile.classList.add("active");
            currentGuess += number;
            currentTile++;
          }
        }
      }

      function deleteNumber() {
        if (gameOver || isSubmitting) return;
        if (currentTile > 0) {
          currentTile--;
          const tile = document.getElementById(
            `row-${currentRow}-tile-${currentTile}`,
          );
          if (tile) {
            tile.innerText = "";
            tile.classList.remove("active");
            currentGuess = currentGuess.slice(0, -1);
          }
        }
      }

      function submitGuess() {
        if (gameOver || isSubmitting) return;
        if (currentTile !== gameLength) return;

        isSubmitting = true;
        socket.emit("submit_guess", { room: roomCode, guess: currentGuess });
      }

      socket.on("guess_result", (data) => {
        isSubmitting = false;

        if (!data.valid) {
          alert(data.message);
          return;
        }

        updateFeedback(data.result);

        // Play success or miss sound based on bulls/cows
        if (data.result.bulls > 0 || data.result.cows > 0) {
          playSound("audio-bull");
        } else {
          playSound("audio-miss");
        }

        currentRow++;
        currentTile = 0;
        currentGuess = "";

        if (currentRow >= document.querySelectorAll(".row").length - 2) {
          for (let k = 0; k < 5; k++)
            addSingleRow(document.querySelectorAll(".row").length);
        }

        const nextRow = document.getElementById(`row-${currentRow}`);
        if (nextRow)
          nextRow.scrollIntoView({ behavior: "smooth", block: "center" });
      });

      function updateFeedback(result) {
        const feedbackBox = document.getElementById(`feedback-${currentRow}`);
        if (!feedbackBox) return;
        feedbackBox.innerHTML = "";

        for (let i = 0; i < result.bulls; i++) {
          let d = document.createElement("div");
          d.className = "dot bull";
          feedbackBox.appendChild(d);
        }
        for (let i = 0; i < result.cows; i++) {
          let d = document.createElement("div");
          d.className = "dot cow";
          feedbackBox.appendChild(d);
        }
        let remaining = gameLength - result.bulls - result.cows;
        for (let i = 0; i < remaining; i++) {
          let d = document.createElement("div");
          d.className = "dot miss";
          feedbackBox.appendChild(d);
        }
      }

      socket.on("opponent_guess", (data) => {
        if (data.player_sid !== mySid) {
          document.getElementById("desktop-opp-attempts").innerText =
            data.attempts;
          document.getElementById("mobile-opp-attempts").innerText =
            data.attempts;
        }
      });

      socket.on("game_over", (data) => {
        gameOver = true;
        const modal = document.getElementById("gameOverModal");

        if (data.winner_sid === mySid) {
          playSound("audio-win");
          document.getElementById("gameOverTitle").innerText =
            "MISSION ACCOMPLISHED";
          document.getElementById("gameOverTitle").style.color = "#538d4e";
          document.getElementById("winner-name").innerText =
            `You won! ${data.loser || "Your opponent"} lost!`;

          // Stat update local tracking if they won (played count handled independently)
          const localStatsStr = localStorage.getItem("codebreaker_stats");
          let myStats = { won: 0, played: 0 };
          if (localStatsStr) {
            try {
              myStats = JSON.parse(localStatsStr);
            } catch (e) {}
          }
          myStats.won++;
          myStats.played++;
          localStorage.setItem("codebreaker_stats", JSON.stringify(myStats));
          document.getElementById("desktop-my-wins").innerText = myStats.won;
          document.getElementById("desktop-my-loss").innerText =
            myStats.played - myStats.won;
          document.getElementById("mobile-my-wins").innerText = myStats.won;
          document.getElementById("mobile-my-loss").innerText =
            myStats.played - myStats.won;

          if (typeof confetti === "function")
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        } else {
          playSound("audio-lose");
          document.getElementById("gameOverTitle").innerText = "MISSION FAILED";
          document.getElementById("gameOverTitle").style.color = "#cf6679";
          document.getElementById("winner-name").innerText =
            `${data.winner} won! You lost!`;
          document.getElementById("winner-name").style.color = "#cf6679";
        }

        document.getElementById("final-code").innerText =
          data.secret_code || "UNKNOWN";

        const rematchBtn = document.getElementById("rematch-btn");
        if (rematchBtn) rematchBtn.style.display = "none";

        modal.classList.remove("hidden");
      });

      socket.on("opponent_reconnected", (data) => {
        const modal = document.getElementById("gameOverModal");
        if (
          !modal.classList.contains("hidden") &&
          document.getElementById("gameOverTitle").innerText === "COMM LOST"
        ) {
          modal.classList.add("hidden");
          gameOver = false;

          // Append to both chats
          const msgHtml = `<div style="color: #538d4e; font-style: italic; font-size: 0.75rem;">System: ${data.username} has reconnected!</div>`;

          const dxBox = document.querySelector(".desktop-chat-box");
          const mbBox = document.querySelector(".mobile-chat-box");

          if (dxBox) {
            const dxDiv = document.createElement("div");
            dxDiv.innerHTML = msgHtml;
            dxBox.appendChild(dxDiv);
            dxBox.scrollTop = dxBox.scrollHeight;
          }
          if (mbBox) {
            const mbDiv = document.createElement("div");
            mbDiv.innerHTML = msgHtml;
            mbBox.appendChild(mbDiv);
            mbBox.scrollTop = mbBox.scrollHeight;
            notifyMobileChat();
          }
        }
      });

      socket.on("opponent_stats", (data) => {
        if (data.sid !== mySid) {
          // Update opponent UI cards if stats are passed
          const dxStats = document.querySelector(".opp-card .player-stats");
          if (dxStats) {
            const oppWins = data.stats.won || 0;
            const oppLoss = (data.stats.played || 0) - oppWins;
            dxStats.innerText = `W: ${oppWins} | L: ${oppLoss}`;
          }
        }
      });

      function requestRematch() {
        const btn = document.getElementById("rematch-btn");
        btn.innerText = "WAITING...";
        btn.disabled = true;
        btn.style.opacity = "0.5";
        socket.emit("request_rematch", { room: roomCode });
      }

      socket.on("rematch_requested", (data) => {
        if (data.player_sid !== mySid) {
          const btn = document.getElementById("rematch-btn");
          if (btn && btn.innerText !== "WAITING...") {
            btn.innerText = "ACCEPT REMATCH";
            btn.style.backgroundColor = "#cf6679";
          }
        }
      });

      socket.on("rematch_accepted", () => {
        document.getElementById("gameOverModal").classList.add("hidden");
        const btn = document.getElementById("rematch-btn");
        btn.innerText = "REQUEST REMATCH";
        btn.disabled = false;
        btn.style.opacity = "1";
        btn.style.backgroundColor = "#538d4e";

        currentRow = 0;
        currentTile = 0;
        currentGuess = "";
        gameOver = false;
        isSubmitting = false;
        document.getElementById("desktop-opp-attempts").innerText = "0";
        document.getElementById("mobile-opp-attempts").innerText = "0";
        createGrid();
      });

      function giveUp() {
        if (
          confirm(
            "Are you sure you want to surrender to your opponent? This counts as a loss.",
          )
        ) {
          // Send surrender event to the server. The server will broadcast 'game_over'
          // which will trigger the result modal to show up cleanly.
          socket.emit("surrender_game", { room: roomCode });
        }
      }

      // --- MOBILE CHAT MODAL LOGIC ---
      function toggleMobileChat() {
        const chat = document.getElementById("mobile-chat-modal");
        const isHidden =
          chat.style.display === "none" || chat.style.display === "";
        chat.style.display = isHidden ? "flex" : "none";

        if (isHidden) {
          // Un-badge when opening
          document.getElementById("mobile-chat-badge").style.display = "none";
        }
      }

      function notifyMobileChat() {
        const chat = document.getElementById("mobile-chat-modal");
        // If the modal is hidden right now, show the red dot on the FAB
        if (chat.style.display === "none" || chat.style.display === "") {
          document.getElementById("mobile-chat-badge").style.display = "block";
        }
      }

      // --- CHAT LOGIC ---
      function handleChatSubmit(e, inputId) {
        e.preventDefault();
        const input = document.getElementById(inputId);
        if (input && input.value.trim() !== "") {
          sendQuickChat(input.value);
          input.value = "";
        }
      }

      function sendQuickChat(msg) {
        socket.emit("send_chat", { room: roomCode, msg: msg });
      }

      socket.on("receive_chat", (data) => {
        playSound("audio-chat");

        const html = `
              <div style="color: #cf6679; font-weight: bold; font-size: 0.75rem;">${data.username}</div>
              <div style="background: #272729; padding: 5px; border-radius: 5px; display: inline-block;">${data.msg}</div>
          `;

        const msgDiv1 = document.createElement("div");
        msgDiv1.style.marginBottom = "8px";
        msgDiv1.innerHTML = html;

        const msgDiv2 = document.createElement("div");
        msgDiv2.style.marginBottom = "8px";
        msgDiv2.innerHTML = html;

        // Append to desktop DOM
        const dxBox = document.querySelector(".desktop-chat-box");
        if (dxBox) {
          dxBox.appendChild(msgDiv1);
          dxBox.scrollTop = dxBox.scrollHeight;
        }

        // Append to mobile DOM
        const mbBox = document.querySelector(".mobile-chat-box");
        if (mbBox) {
          mbBox.appendChild(msgDiv2);
          mbBox.scrollTop = mbBox.scrollHeight;
        }

        // Notify mobile badge if screen is small and chat is closed
        notifyMobileChat();
      });

      // --- PHYSICAL KEYBOARD ---
      document.addEventListener("keydown", (e) => {
        if (gameOver || e.target.tagName.toLowerCase() === "input") return;
        if (e.metaKey || e.ctrlKey) return;

        if (e.key === "Enter") {
          e.preventDefault();
          playSound("audio-click");
          submitGuess();
        } else if (e.key === "Backspace") {
          playSound("audio-click");
          deleteNumber();
        } else if (e.key >= "0" && e.key <= "9") {
          playSound("audio-click");
          handleInput(e.key);
        }
      });
    </script>
  </body>
</html>
