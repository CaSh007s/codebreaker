<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeBreaker | Multiplayer Game</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
      /* Multiplayer specific CSS overlay for chat and opponent */
      #opponent-status {
        background: #272729;
        border-bottom: 2px solid #cf6679;
        padding: 5px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.9rem;
        flex-shrink: 0;
        width: 100%;
        box-sizing: border-box;
        z-index: 40;
      }
      #opponent-status img {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        vertical-align: middle;
        margin-right: 10px;
        border: 1px solid #cf6679;
      }

      .chat-modal {
        display: none;
        position: fixed;
        bottom: 80px;
        right: 20px;
        width: 300px;
        height: 400px;
        background: #121213;
        border: 2px solid #538d4e;
        border-radius: 10px;
        flex-direction: column;
        z-index: 1000;
      }
      .chat-messages {
        flex-grow: 1;
        overflow-y: auto;
        padding: 10px;
        font-size: 0.85rem;
      }
      .chat-input-area {
        display: flex;
        padding: 5px;
        border-top: 1px solid #3a3a3c;
      }
      .chat-input-area input {
        flex-grow: 1;
        background: #272729;
        color: white;
        border: 1px solid #3a3a3c;
        padding: 5px;
        border-radius: 5px;
      }
      .chat-input-area button {
        background: #538d4e;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
        margin-left: 5px;
      }

      .quick-chats {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        padding: 5px;
        border-top: 1px solid #3a3a3c;
      }
      .quick-chats button {
        background: #272729;
        color: #b0b3b8;
        border: 1px solid #3a3a3c;
        border-radius: 15px;
        font-size: 0.7rem;
        padding: 3px 8px;
        cursor: pointer;
      }

      @media (max-width: 600px) {
        .chat-modal {
          width: 90%;
          right: 5%;
          bottom: 100px;
          height: 350px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1 style="flex-grow: 1; text-align: center">SECURE COMM</h1>
      <div class="header-tools">
        <button
          id="chat-btn"
          class="tool-btn"
          title="Chat"
          onclick="toggleChat()"
        >
          💬
        </button>
        <button
          id="giveup-btn"
          class="tool-btn"
          title="Give Up"
          style="font-size: 1.5rem"
          onclick="giveUp()"
        >
          🏳️
        </button>
      </div>
    </header>

    <!-- Audio Elements -->
    <audio
      id="audio-click"
      src="{{ url_for('static', filename='audio/click.wav') }}"
      preload="auto"
    ></audio>
    <audio
      id="audio-bull"
      src="{{ url_for('static', filename='audio/bull.wav') }}"
      preload="auto"
    ></audio>
    <audio
      id="audio-miss"
      src="{{ url_for('static', filename='audio/miss.wav') }}"
      preload="auto"
    ></audio>
    <audio
      id="audio-chat"
      src="{{ url_for('static', filename='audio/chat.wav') }}"
      preload="auto"
    ></audio>
    <audio
      id="audio-win"
      src="{{ url_for('static', filename='audio/game-win.mp3') }}"
      preload="auto"
    ></audio>
    <audio
      id="audio-lose"
      src="{{ url_for('static', filename='audio/game-lose.mp3') }}"
      preload="auto"
    ></audio>

    <div id="opponent-status">
      <div>
        <img
          src="https://api.dicebear.com/7.x/bottts/svg?seed={{ opponent.avatar|default('none') }}"
        />
        <span style="color: #cf6679"
          >{{ opponent.username|default('Opponent') }}</span
        >
      </div>
      <div>
        Attempts:
        <span id="opp-attempts" style="font-weight: bold; color: white">0</span>
      </div>
    </div>

    <div id="game-board"></div>

    <div id="keyboard">
      <button class="key">1</button>
      <button class="key">2</button>
      <button class="key">3</button>
      <button class="key">4</button>
      <button class="key">5</button>

      <button class="key">6</button>
      <button class="key">7</button>
      <button class="key">8</button>
      <button class="key">9</button>
      <button class="key">0</button>

      <button id="del-btn" class="key big-key" style="grid-column: span 2">
        DELETE
      </button>
      <button
        id="enter-btn"
        class="key big-key"
        style="grid-column: span 3; background-color: #538d4e"
      >
        ENTER
      </button>
    </div>

    <!-- Chat Modal -->
    <div id="chat-modal" class="chat-modal">
      <div
        style="
          background: #538d4e;
          color: white;
          padding: 5px 10px;
          font-weight: bold;
          display: flex;
          justify-content: space-between;
          align-items: center;
          border-top-left-radius: 8px;
          border-top-right-radius: 8px;
        "
      >
        <span>Game Chat</span>
        <span style="cursor: pointer; font-size: 1.2rem" onclick="toggleChat()"
          >&times;</span
        >
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="quick-chats">
        <button onclick="sendQuickChat('GLHF!')">GLHF</button>
        <button onclick="sendQuickChat('Wow!')">Wow!</button>
        <button onclick="sendQuickChat('Nice guess')">Nice guess</button>
        <button onclick="sendQuickChat('GG')">GG</button>
      </div>
      <form class="chat-input-area" id="chat-form">
        <input
          type="text"
          id="chat-input"
          placeholder="Message"
          autocomplete="off"
        />
        <button type="submit">&gt;</button>
      </form>
    </div>

    <!-- Game Over Modal (Reusing index.html styling) -->
    <div id="gameOverModal" class="modal hidden">
      <div class="modal-content">
        <h2 id="gameOverTitle" style="margin-top: 0; text-align: center">
          MATCH OVER
        </h2>
        <hr style="border-color: #3a3a3c" />
        <div style="text-align: center; margin: 20px 0">
          <h3 id="winner-name" style="color: #538d4e; margin-bottom: 5px"></h3>
          <p style="color: #818384; font-size: 0.9rem">The code was:</p>
          <div
            id="final-code"
            style="
              font-size: 2.5rem;
              letter-spacing: 10px;
              color: white;
              background-color: #272729;
              display: inline-block;
              padding: 10px;
              border-radius: 10px;
            "
          ></div>
        </div>
        <div style="text-align: center; margin-top: 20px" id="modal-buttons">
          <button
            id="rematch-btn"
            class="btn-start"
            style="
              display: inline-block;
              padding: 10px 20px;
              font-size: 1rem;
              margin-right: 10px;
              cursor: pointer;
            "
            onclick="requestRematch()"
          >
            REQUEST REMATCH
          </button>
          <a
            href="/"
            class="btn-start"
            style="
              display: inline-block;
              padding: 10px 20px;
              font-size: 1rem;
              text-decoration: none;
              background-color: #3a3a3c;
            "
            >RETURN TO BASE</a
          >
        </div>
      </div>
    </div>

    <!-- INLINE SCRIPT FOR MULTIPLAYER DOM LOGIC -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script>
      const socket = io();
      const roomCode = "{{ room_code }}";
      const mySid = "{{ session.get('sid') }}";
      const gameLength = Number("{{ length|default(4) }}");
      const maxTries = 100; // Basically unlimited for multiplayer

      let currentRow = 0;
      let currentTile = 0;
      let gameOver = false;
      let currentGuess = "";
      let isSubmitting = false;

      document.addEventListener("DOMContentLoaded", () => {
        createGrid();
        setupKeyboard();
        socket.emit("join_game", { room: roomCode });
      });

      function createGrid() {
        const board = document.getElementById("game-board");
        board.innerHTML = "";
        for (let i = 0; i < 12; i++) addSingleRow(i);
      }

      function addSingleRow(rowIndex) {
        const board = document.getElementById("game-board");
        const row = document.createElement("div");
        row.classList.add("row");
        row.id = `row-${rowIndex}`;

        for (let j = 0; j < gameLength; j++) {
          const tile = document.createElement("div");
          tile.classList.add("tile");
          tile.id = `row-${rowIndex}-tile-${j}`;
          row.appendChild(tile);
        }

        const feedbackBox = document.createElement("div");
        feedbackBox.classList.add("feedback-box");
        feedbackBox.id = `feedback-${rowIndex}`;

        for (let k = 0; k < gameLength; k++) {
          const dot = document.createElement("div");
          dot.classList.add("dot");
          feedbackBox.appendChild(dot);
        }

        row.appendChild(feedbackBox);
        board.appendChild(row);
      }

      // --- INPUT LOGIC ---
      function playSound(id) {
        const sound = document.getElementById(id);
        if (sound) {
          sound.currentTime = 0;
          sound
            .play()
            .catch((err) => console.log("Audio play prevented:", err));
        }
      }

      function setupKeyboard() {
        const keyboard = document.getElementById("keyboard");
        keyboard.addEventListener("click", (e) => {
          const btn = e.target.closest("button");
          if (!btn) return;
          e.preventDefault();
          btn.blur();
          playSound("audio-click");
          const val = btn.innerText.trim();
          if (val === "ENTER") submitGuess();
          else if (val === "DELETE") deleteNumber();
          else handleInput(val);
        });

        keyboard.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          const btn = e.target.closest("button");
          if (btn && btn.innerText !== "ENTER" && btn.innerText !== "DELETE") {
            btn.classList.toggle("crossed-out");
          }
        });
      }

      function handleInput(number) {
        if (gameOver || isSubmitting) return;
        if (currentTile < gameLength) {
          const tile = document.getElementById(
            `row-${currentRow}-tile-${currentTile}`,
          );
          if (tile) {
            tile.innerText = number;
            tile.classList.add("active");
            currentGuess += number;
            currentTile++;
          }
        }
      }

      function deleteNumber() {
        if (gameOver || isSubmitting) return;
        if (currentTile > 0) {
          currentTile--;
          const tile = document.getElementById(
            `row-${currentRow}-tile-${currentTile}`,
          );
          if (tile) {
            tile.innerText = "";
            tile.classList.remove("active");
            currentGuess = currentGuess.slice(0, -1);
          }
        }
      }

      function submitGuess() {
        if (gameOver || isSubmitting) return;
        if (currentTile !== gameLength) return;

        isSubmitting = true;
        socket.emit("submit_guess", { room: roomCode, guess: currentGuess });
      }

      socket.on("guess_result", (data) => {
        isSubmitting = false;

        if (!data.valid) {
          alert(data.message);
          return;
        }

        updateFeedback(data.result);

        // Play success or miss sound based on bulls/cows
        if (data.result.bulls > 0 || data.result.cows > 0) {
          playSound("audio-bull");
        } else {
          playSound("audio-miss");
        }

        currentRow++;
        currentTile = 0;
        currentGuess = "";

        if (currentRow >= document.querySelectorAll(".row").length - 2) {
          for (let k = 0; k < 5; k++)
            addSingleRow(document.querySelectorAll(".row").length);
        }

        const nextRow = document.getElementById(`row-${currentRow}`);
        if (nextRow)
          nextRow.scrollIntoView({ behavior: "smooth", block: "center" });
      });

      function updateFeedback(result) {
        const feedbackBox = document.getElementById(`feedback-${currentRow}`);
        if (!feedbackBox) return;
        feedbackBox.innerHTML = "";

        for (let i = 0; i < result.bulls; i++) {
          let d = document.createElement("div");
          d.className = "dot bull";
          feedbackBox.appendChild(d);
        }
        for (let i = 0; i < result.cows; i++) {
          let d = document.createElement("div");
          d.className = "dot cow";
          feedbackBox.appendChild(d);
        }
        let remaining = gameLength - result.bulls - result.cows;
        for (let i = 0; i < remaining; i++) {
          let d = document.createElement("div");
          d.className = "dot miss";
          feedbackBox.appendChild(d);
        }
      }

      socket.on("opponent_guess", (data) => {
        if (data.player_sid !== mySid) {
          document.getElementById("opp-attempts").innerText = data.attempts;
          const oppStatus = document.getElementById("opponent-status");
          oppStatus.style.borderBottomColor = "white";
          setTimeout(
            () => (oppStatus.style.borderBottomColor = "#cf6679"),
            300,
          );
        }
      });

      socket.on("game_over", (data) => {
        gameOver = true;
        const modal = document.getElementById("gameOverModal");

        if (data.winner_sid === mySid) {
          playSound("audio-win");
          document.getElementById("gameOverTitle").innerText =
            "MISSION ACCOMPLISHED";
          document.getElementById("gameOverTitle").style.color = "#538d4e";
          document.getElementById("winner-name").innerText =
            "You Crack'd the Code!";
          if (typeof confetti === "function")
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        } else {
          playSound("audio-lose");
          document.getElementById("gameOverTitle").innerText = "MISSION FAILED";
          document.getElementById("gameOverTitle").style.color = "#cf6679";
          document.getElementById("winner-name").innerText =
            `${data.winner} won the game!`;
          document.getElementById("winner-name").style.color = "#cf6679";
        }

        document.getElementById("final-code").innerText = data.secret_code;
        modal.classList.remove("hidden");
      });

      socket.on("opponent_disconnected", (data) => {
        gameOver = true;
        playSound("audio-lose");
        const modal = document.getElementById("gameOverModal");
        document.getElementById("gameOverTitle").innerText = "COMM LOST";
        document.getElementById("gameOverTitle").style.color = "#cf6679";
        document.getElementById("winner-name").innerText =
          "Opponent Fled The Mission!";
        document.getElementById("winner-name").style.color = "#cf6679";
        document.getElementById("final-code").innerText = "ABORTED";

        const rematchBtn = document.getElementById("rematch-btn");
        if (rematchBtn) rematchBtn.style.display = "none";

        modal.classList.remove("hidden");
      });

      function requestRematch() {
        const btn = document.getElementById("rematch-btn");
        btn.innerText = "WAITING...";
        btn.disabled = true;
        btn.style.opacity = "0.5";
        socket.emit("request_rematch", { room: roomCode });
      }

      socket.on("rematch_requested", (data) => {
        if (data.player_sid !== mySid) {
          const btn = document.getElementById("rematch-btn");
          if (btn && btn.innerText !== "WAITING...") {
            btn.innerText = "ACCEPT REMATCH";
            btn.style.backgroundColor = "#cf6679";
          }
        }
      });

      socket.on("rematch_accepted", () => {
        document.getElementById("gameOverModal").classList.add("hidden");
        const btn = document.getElementById("rematch-btn");
        btn.innerText = "REQUEST REMATCH";
        btn.disabled = false;
        btn.style.opacity = "1";
        btn.style.backgroundColor = "#538d4e";

        currentRow = 0;
        currentTile = 0;
        currentGuess = "";
        gameOver = false;
        isSubmitting = false;
        document.getElementById("opp-attempts").innerText = "0";
        createGrid();
      });

      function giveUp() {
        if (confirm("Are you sure you want to surrender to your opponent?")) {
          window.location.href = "/";
        }
      }

      // --- CHAT LOGIC ---
      function toggleChat() {
        const chat = document.getElementById("chat-modal");
        chat.style.display = chat.style.display === "flex" ? "none" : "flex";
      }

      document
        .getElementById("chat-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const input = document.getElementById("chat-input");
          if (input.value.trim() !== "") {
            sendQuickChat(input.value);
            input.value = "";
          }
        });

      function sendQuickChat(msg) {
        socket.emit("send_chat", { room: roomCode, msg: msg });
      }

      socket.on("receive_chat", (data) => {
        playSound("audio-chat");
        const chatBox = document.getElementById("chat-messages");
        const msgDiv = document.createElement("div");
        msgDiv.style.marginBottom = "8px";
        msgDiv.innerHTML = `
              <div style="color: #cf6679; font-weight: bold; font-size: 0.75rem;">${data.username}</div>
              <div style="background: #272729; padding: 5px; border-radius: 5px; display: inline-block;">${data.msg}</div>
          `;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        const btn = document.getElementById("chat-btn");
        btn.style.color = "#cf6679";
        setTimeout(() => (btn.style.color = "white"), 1000);
      });

      // --- PHYSICAL KEYBOARD ---
      document.addEventListener("keydown", (e) => {
        if (gameOver || document.activeElement.id === "chat-input") return;
        if (e.metaKey || e.ctrlKey) return;

        if (e.key === "Enter") {
          e.preventDefault();
          playSound("audio-click");
          submitGuess();
        } else if (e.key === "Backspace") {
          playSound("audio-click");
          deleteNumber();
        } else if (e.key >= "0" && e.key <= "9") {
          playSound("audio-click");
          handleInput(e.key);
        }
      });
    </script>
  </body>
</html>
